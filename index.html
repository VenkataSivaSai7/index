<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor!</title>
    <link rel="stylesheet" href="rockpaperscissor.css">
</head>
<body>
    <h2> ROCK PAPER SCISSOR</h2>
    <!-- choice of selecting either rock-paper-scissor-->
    <div class="choices">
        <div class="choice" id="rock">
            <img src="rock.png.jpeg" alt="rock">
        </div>
        <div class="choice" id="paper">
            <img src="paper.png.jpeg" alt="paper">
        </div>
        <div class="choice" id="scissors">
            <img src="scissor.png.jpeg" alt="scissors">
        </div>
    </div> 

    <div class="score-board">
        <div class="score">
            <p id="you">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="computer">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play Your-Move</p>
    </div>
    <script src="rockpaperscissor.js"></script>
</body>
</html>
